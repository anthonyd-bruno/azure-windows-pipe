# azure-pipelines.yml
trigger:
  - main

pr:
  - main

pool:
  vmImage: 'windows-latest'

variables:
  PNPM_STORE_PATH: '$(Pipeline.Workspace)/.pnpm-store'

stages:
  - stage: BuildAndTest
    displayName: 'Build and Test'
    jobs:
      - job: Build
        displayName: 'Build'
        steps:
          - checkout: self

          - script: echo "Azure Pipelines Execution - Build and Test the repo"
            displayName: 'Run a one-line script'

          - task: NodeTool@0
            displayName: 'Use Node.js 24'
            inputs:
              versionSpec: '24.x'

          - task: Cache@2
            displayName: 'Cache pnpm store'
            inputs:
              key: 'pnpm | "$(Agent.OS)" | pnpm-lock.yaml'
              restoreKeys: |
                pnpm | "$(Agent.OS)"
              path: '$(PNPM_STORE_PATH)'

          - script: |
              corepack pnpm config set store-dir "$(PNPM_STORE_PATH)"
              corepack pnpm install --frozen-lockfile
            displayName: 'Install dependencies with pnpm'

          - script: |
              corepack pnpm exec bru --version
            displayName: 'Use local Bruno CLI'
