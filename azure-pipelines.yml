# azure-pipelines.yml
trigger:
  - main

pr:
  - main

pool:
  vmImage: 'windows-latest'

variables:
  PNPM_STORE_PATH: '$(Pipeline.Workspace)/.pnpm-store'

stages:
  - stage: BuildAndTest
    displayName: 'Build and Test'
    jobs:
      - job: Build
        displayName: 'Build'
        steps:
          - checkout: self

          - script: echo "Azure Pipelines Execution - Build and Test the repo"
            displayName: 'Run a one-line script'

          - task: NodeTool@0
            displayName: 'Use Node.js 24'
            inputs:
              versionSpec: '24.x'

          - task: Cache@2
            displayName: 'Cache pnpm store'
            inputs:
              key: 'pnpm | "$(Agent.OS)" | pnpm-lock.yaml'
              restoreKeys: |
                pnpm | "$(Agent.OS)"
              path: '$(PNPM_STORE_PATH)'

          - pwsh: |
              corepack pnpm config set store-dir "$env:PNPM_STORE_PATH"
              corepack pnpm install --frozen-lockfile
            displayName: 'Install dependencies with pnpm'

          - pwsh: |
              Write-Host "Node version:"
              node --version
              Write-Host "pnpm version:"
              corepack pnpm --version
              Write-Host "Bruno resolved path:"
              $bru = (node -p "require.resolve('@usebruno/cli/bin/bru.js')").Trim()
              Write-Host $bru
              Write-Host "Bruno path exists:"
              Test-Path $bru
              Write-Host "node_modules/.bin contents:"
              Get-ChildItem .\node_modules\.bin | Select-Object Name
              Write-Host "First pnpm package entries:"
              Get-ChildItem .\node_modules\.pnpm | Select-Object -First 20 Name
            displayName: 'Debug pnpm and Bruno layout'

          - pwsh: |
              $bruCmd = ".\node_modules\.bin\bru.CMD"
              if (Test-Path $bruCmd) {
                & $bruCmd --help
                exit $LASTEXITCODE
              }

              $bru = (node -p "require.resolve('@usebruno/cli/bin/bru.js')").Trim()
              if (-not (Test-Path $bru)) {
                throw "Bruno CLI entrypoint not found: $bru"
              }
              & node $bru --help
              exit $LASTEXITCODE
            displayName: 'Use local Bruno CLI'
